<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@100;200;300;700;900&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;}
body{width:1080px;height:1350px;overflow:hidden;background:#080808;}
.c{width:1080px;height:1350px;position:relative;overflow:hidden;}

/* Carro fantasma — mais visível */
.car{position:absolute;inset:0;z-index:1;}
.car img{width:100%;height:100%;object-fit:cover;object-position:55% 48%;
  filter:brightness(.22) contrast(1.35) saturate(0);}

/* Glow sutil vermelho */
.glow{position:absolute;bottom:0;left:0;right:0;height:600px;z-index:2;
  background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(215,25,32,.07) 0%,transparent 70%);}

/* Estrutura — linhas editoriais */
.line-top{position:absolute;top:360px;left:58px;right:58px;z-index:5;height:1px;
  background:rgba(255,255,255,.1);}
.line-top-acc{position:absolute;top:358px;left:58px;z-index:6;
  width:72px;height:3px;background:#D71920;}
.line-mid{position:absolute;top:760px;left:58px;right:58px;z-index:5;height:1px;
  background:rgba(255,255,255,.08);}

/* Header */
.header{position:absolute;top:46px;left:58px;right:58px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;}
.h-brand{display:flex;align-items:center;gap:10px;}
.h-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;
  color:#fff;letter-spacing:5px;text-transform:uppercase;}
.h-pipe{color:rgba(255,255,255,.35);margin:0 8px;}
.h-dealer{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:16px;
  color:rgba(255,255,255,.7);letter-spacing:4px;text-transform:uppercase;}
.h-url{font-family:'Inter',sans-serif;font-size:10px;font-weight:400;
  letter-spacing:3px;color:rgba(255,255,255,.55);}

.eye{position:absolute;top:136px;left:58px;z-index:20;
  font-family:'Inter',sans-serif;font-size:9px;font-weight:500;
  letter-spacing:7px;text-transform:uppercase;color:rgba(255,255,255,.55);}

/* STAT */
.stat-block{position:absolute;top:172px;left:50px;z-index:20;
  display:flex;align-items:flex-start;gap:0;}
.stat-plus{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:280px;
  line-height:.82;color:#D71920;letter-spacing:-8px;margin-top:8px;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:340px;
  line-height:.82;color:#fff;letter-spacing:-10px;}

/* Sub stat */
.stat-sub{position:absolute;top:486px;left:58px;z-index:20;}
.ss-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:68px;
  text-transform:uppercase;letter-spacing:-1px;color:#fff;line-height:.95;}
.ss-desc{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:26px;
  letter-spacing:7px;text-transform:uppercase;color:rgba(255,255,255,.62);
  margin-top:16px;}

/* Contexto visual — seção do meio */
.mid-section{position:absolute;top:780px;left:58px;right:58px;z-index:20;
  display:flex;gap:0;}
.mid-item{flex:1;padding-right:32px;border-right:1px solid rgba(255,255,255,.08);}
.mid-item:last-child{border-right:none;padding-left:32px;padding-right:0;}
.mi-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:38px;
  color:#fff;line-height:1;}
.mi-unit{font-family:'Barlow Condensed',sans-serif;font-weight:200;font-size:18px;
  color:#D71920;margin-left:2px;}
.mi-lbl{font-family:'Inter',sans-serif;font-size:9px;font-weight:400;
  letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:6px;}

/* Copy */
.copy{position:absolute;bottom:115px;left:58px;right:58px;z-index:20;
  border-left:2.5px solid #D71920;padding-left:22px;}
.copy-text{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:36px;
  line-height:1.35;color:rgba(255,255,255,.72);}
.copy-text strong{color:#fff;font-weight:700;}

/* Footer */
.footer{position:absolute;bottom:46px;left:58px;right:58px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid rgba(255,255,255,.08);padding-top:18px;}
.f-left{display:flex;align-items:center;gap:12px;}
.f-city{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;
  letter-spacing:5px;color:rgba(255,255,255,.6);text-transform:uppercase;}
.f-dot{width:3px;height:3px;background:#D71920;border-radius:50%;}
.f-tag{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:5px;color:#D71920;text-transform:uppercase;}
.f-model{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:400;
  letter-spacing:4px;color:rgba(255,255,255,.5);text-transform:uppercase;}
</style>
</head>
<body>
<div class="c">
  <div class="car"><img src="../imagens/h6-phev-blue.jpg" alt=""></div>
  <div class="glow"></div>
  <div class="line-top"></div>
  <div class="line-top-acc"></div>
  <div class="line-mid"></div>

  <div class="header">
    <div class="h-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12.5" stroke="white" stroke-width="1.2"/>
        <text x="14" y="18.5" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="7.5" font-weight="900" fill="white">GWM</text>
      </svg>
      <span class="h-name">GWM</span><span class="h-pipe">|</span><span class="h-dealer">DAHRUJ</span>
    </div>
    <div class="h-url">gwmdahruj.com.br</div>
  </div>

  <div class="eye">Tecnologia · PHEV · Autonomia</div>

  <div class="stat-block">
    <span class="stat-plus">+</span><span class="stat-num">800</span>
  </div>

  <div class="stat-sub">
    <div class="ss-lbl">KM POR<br>RECARGA.</div>
    <div class="ss-desc">HAVAL H6 PHEV · Modo híbrido</div>
  </div>

  <div class="mid-section">
    <div class="mid-item">
      <div><span class="mi-val">244</span><span class="mi-unit">cv</span></div>
      <div class="mi-lbl">Motor combinado</div>
    </div>
    <div class="mid-item">
      <div><span class="mi-val">1.5T</span></div>
      <div class="mi-lbl">Motor turbo</div>
    </div>
    <div class="mid-item" style="padding-left:32px;">
      <div><span class="mi-val">0</span><span class="mi-unit">R$/km</span></div>
      <div class="mi-lbl">Modo elétrico</div>
    </div>
  </div>

  <div class="copy">
    <div class="copy-text">
      Enquanto você abastece <strong>uma vez</strong>,<br>
      o H6 já percorreu <strong>o Brasil inteiro.</strong>
    </div>
  </div>

  <div class="footer">
    <div class="f-left">
      <div class="f-city">Jundiaí — SP</div>
      <div class="f-dot"></div>
      <div class="f-tag">GWM Dahruj</div>
    </div>
    <div class="f-model">HAVAL H6 PHEV</div>
  </div>
</div>
</body>
</html>
