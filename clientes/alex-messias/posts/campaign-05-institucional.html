<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@100;200;300;700;900&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;}
body{width:1080px;height:1350px;overflow:hidden;background:#080808;}
.c{width:1080px;height:1350px;position:relative;overflow:hidden;}

/* Carro prata — mais visível */
.car{position:absolute;inset:0;z-index:1;}
.car img{width:100%;height:100%;object-fit:cover;object-position:55% 45%;
  filter:brightness(.28) contrast(1.4) saturate(0);}

.ov{position:absolute;inset:0;z-index:2;
  background:radial-gradient(ellipse 110% 90% at 70% 50%,rgba(8,8,8,0) 0%,rgba(8,8,8,.55) 55%,rgba(8,8,8,.96) 100%);}
.ov-b{position:absolute;bottom:0;left:0;right:0;height:380px;z-index:3;
  background:linear-gradient(to top,rgba(8,8,8,.99) 0%,rgba(8,8,8,.35) 60%,transparent 100%);}
.ov-t{position:absolute;top:0;left:0;right:0;height:180px;z-index:3;
  background:linear-gradient(to bottom,rgba(8,8,8,.96) 0%,transparent 100%);}

/* Accento vermelho geométrico */
.red-v{position:absolute;top:0;right:0;z-index:6;
  width:5px;height:440px;
  background:linear-gradient(to bottom,#D71920 0%,rgba(215,25,32,0) 100%);}
.red-h{position:absolute;top:0;right:0;z-index:6;
  width:220px;height:3px;background:#D71920;}

/* Header */
.header{position:absolute;top:46px;left:58px;right:58px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;}
.h-brand{display:flex;align-items:center;gap:10px;}
.h-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;
  color:#fff;letter-spacing:5px;text-transform:uppercase;}
.h-pipe{color:rgba(255,255,255,.35);margin:0 8px;}
.h-dealer{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:16px;
  color:rgba(255,255,255,.7);letter-spacing:4px;text-transform:uppercase;}
.h-url{font-family:'Inter',sans-serif;font-size:10px;font-weight:400;
  letter-spacing:3px;color:rgba(255,255,255,.55);}

/* Centro */
.center{position:absolute;top:50%;left:0;right:0;z-index:20;
  transform:translateY(-50%);padding:0 58px;}

.c-eyebrow{font-family:'Inter',sans-serif;font-size:9px;font-weight:500;
  letter-spacing:9px;text-transform:uppercase;color:rgba(255,255,255,.55);
  margin-bottom:36px;display:flex;align-items:center;gap:14px;}
.c-eyebrow::before{content:'';display:block;width:32px;height:1.5px;background:#D71920;}

.c-h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:188px;
  line-height:.82;text-transform:uppercase;letter-spacing:-4px;color:#fff;}
.c-h2{font-family:'Barlow Condensed',sans-serif;font-weight:100;font-size:188px;
  line-height:.82;text-transform:uppercase;letter-spacing:-4px;
  -webkit-text-stroke:2px rgba(255,255,255,.38);color:transparent;}
.c-h2 .red{color:#D71920;-webkit-text-stroke:0;}

.c-div{width:52px;height:1.5px;background:rgba(255,255,255,.15);margin:42px 0;}

.c-sub{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:30px;
  letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.65);
  max-width:560px;line-height:1.4;}

/* Modelos */
.models{position:absolute;bottom:128px;left:58px;right:58px;z-index:20;
  display:flex;gap:0;align-items:flex-start;}
.mod{flex:1;padding-right:24px;border-right:1px solid rgba(255,255,255,.08);}
.mod:last-child{border-right:none;padding-right:0;}
.mod-dot{width:24px;height:2px;background:#D71920;margin-bottom:14px;}
.mod-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;
  color:rgba(255,255,255,.9);letter-spacing:2px;text-transform:uppercase;}
.mod-type{font-family:'Inter',sans-serif;font-size:9px;font-weight:400;
  letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:5px;}

/* Footer */
.footer{position:absolute;bottom:46px;left:58px;right:58px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid rgba(255,255,255,.07);padding-top:20px;}
.f-left{display:flex;align-items:center;gap:12px;}
.f-city{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;
  letter-spacing:5px;color:rgba(255,255,255,.6);text-transform:uppercase;}
.f-dot{width:3px;height:3px;background:#D71920;border-radius:50%;}
.f-tag{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:5px;color:#D71920;text-transform:uppercase;}
.f-year{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:200;
  letter-spacing:5px;color:rgba(255,255,255,.4);text-transform:uppercase;}
</style>
</head>
<body>
<div class="c">
  <div class="car"><img src="../imagens/h6-silver-event.jpg" alt=""></div>
  <div class="ov"></div>
  <div class="ov-b"></div>
  <div class="ov-t"></div>
  <div class="red-v"></div>
  <div class="red-h"></div>

  <div class="header">
    <div class="h-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12.5" stroke="white" stroke-width="1.2"/>
        <text x="14" y="18.5" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="7.5" font-weight="900" fill="white">GWM</text>
      </svg>
      <span class="h-name">GWM</span><span class="h-pipe">|</span><span class="h-dealer">DAHRUJ</span>
    </div>
    <div class="h-url">gwmdahruj.com.br</div>
  </div>

  <div class="center">
    <div class="c-eyebrow">GWM Dahruj · Jundiaí</div>
    <div class="c-h1">MOBILIDADE</div>
    <div class="c-h2">SEM<br>LIMITES<span class="red">.</span></div>
    <div class="c-div"></div>
    <div class="c-sub">GWM chegou a Jundiaí.<br>E redefiniu o que um SUV pode ser.</div>
  </div>

  <div class="models">
    <div class="mod">
      <div class="mod-dot"></div>
      <div class="mod-name">HAVAL H6</div>
      <div class="mod-type">HEV · PHEV 35</div>
    </div>
    <div class="mod" style="padding-left:24px;">
      <div class="mod-dot"></div>
      <div class="mod-name">HAVAL H9</div>
      <div class="mod-type">V6 · Turbo</div>
    </div>
    <div class="mod" style="padding-left:24px;">
      <div class="mod-dot"></div>
      <div class="mod-name">ORA 03</div>
      <div class="mod-type">100% Elétrico</div>
    </div>
  </div>

  <div class="footer">
    <div class="f-left">
      <div class="f-city">Jundiaí — SP</div>
      <div class="f-dot"></div>
      <div class="f-tag">GWM Dahruj</div>
    </div>
    <div class="f-year">Campanha 2026</div>
  </div>
</div>
</body>
</html>
