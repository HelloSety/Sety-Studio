<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@100;200;300;700;900&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;}
body{width:1080px;height:1350px;overflow:hidden;background:#0d0d0d;}
.c{width:1080px;height:1350px;position:relative;overflow:hidden;}

.car{position:absolute;inset:0;z-index:1;}
.car img{width:100%;height:100%;object-fit:cover;object-position:55% 60%;
  filter:brightness(.75) contrast(1.12) saturate(.75);}

.ov-t{position:absolute;top:0;left:0;right:0;height:500px;z-index:2;
  background:linear-gradient(to bottom,rgba(13,13,13,.98) 0%,rgba(13,13,13,.75) 62%,transparent 100%);}
.ov-b{position:absolute;bottom:0;left:0;right:0;height:300px;z-index:2;
  background:linear-gradient(to top,rgba(13,13,13,.97) 0%,transparent 100%);}

.line-r{position:absolute;top:430px;left:0;right:0;z-index:5;height:2px;
  background:linear-gradient(to right,transparent 0%,#D71920 8%,#D71920 70%,transparent 100%);}

.header{position:absolute;top:46px;left:58px;right:58px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;}
.h-brand{display:flex;align-items:center;gap:10px;}
.h-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;
  color:#fff;letter-spacing:5px;text-transform:uppercase;}
.h-pipe{color:rgba(255,255,255,.35);margin:0 8px;}
.h-dealer{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:16px;
  color:rgba(255,255,255,.7);letter-spacing:4px;text-transform:uppercase;}
.h-url{font-family:'Inter',sans-serif;font-size:10px;font-weight:400;
  letter-spacing:3px;color:rgba(255,255,255,.55);}

.cat{position:absolute;top:128px;left:58px;z-index:20;
  display:flex;align-items:center;gap:10px;}
.cat-bar{width:28px;height:1.5px;background:#D71920;}
.cat-txt{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:7px;text-transform:uppercase;color:#D71920;}

.title-block{position:absolute;top:162px;left:56px;z-index:20;}
.t-model{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:178px;
  line-height:.84;text-transform:uppercase;letter-spacing:-3px;color:#fff;}
.t-sub{font-family:'Barlow Condensed',sans-serif;font-weight:100;font-size:110px;
  line-height:.84;text-transform:uppercase;letter-spacing:-2px;
  -webkit-text-stroke:1.5px rgba(255,255,255,.45);color:transparent;}

.tagline{position:absolute;top:456px;left:58px;z-index:20;
  font-family:'Barlow Condensed',sans-serif;font-weight:400;font-size:32px;
  letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.72);}

/* Specs */
.specs{position:absolute;bottom:110px;left:58px;right:58px;z-index:20;
  display:flex;gap:0;border-top:1px solid rgba(255,255,255,.12);padding-top:28px;}
.spec{flex:1;border-right:1px solid rgba(255,255,255,.1);padding-right:24px;}
.spec:last-child{border-right:none;}
.sp-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:44px;
  color:#fff;letter-spacing:-1px;line-height:1;}
.sp-unit{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:18px;
  color:#D71920;letter-spacing:2px;margin-left:2px;}
.sp-lbl{font-family:'Inter',sans-serif;font-size:9px;font-weight:400;
  letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:6px;}

.footer{position:absolute;bottom:46px;left:58px;right:58px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;}
.f-left{display:flex;align-items:center;gap:12px;}
.f-city{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;
  letter-spacing:5px;color:rgba(255,255,255,.6);text-transform:uppercase;}
.f-dot{width:3px;height:3px;background:#D71920;border-radius:50%;}
.f-tag{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:5px;color:#D71920;text-transform:uppercase;}
.f-url{font-family:'Inter',sans-serif;font-size:10px;font-weight:400;
  letter-spacing:3px;color:rgba(255,255,255,.5);}
</style>
</head>
<body>
<div class="c">
  <div class="car"><img src="../imagens/h6-white2.webp" alt=""></div>
  <div class="ov-t"></div>
  <div class="ov-b"></div>
  <div class="line-r"></div>

  <div class="header">
    <div class="h-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12.5" stroke="white" stroke-width="1.2"/>
        <text x="14" y="18.5" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="7.5" font-weight="900" fill="white">GWM</text>
      </svg>
      <span class="h-name">GWM</span><span class="h-pipe">|</span><span class="h-dealer">DAHRUJ</span>
    </div>
    <div class="h-url">gwmdahruj.com.br</div>
  </div>

  <div class="cat"><div class="cat-bar"></div><div class="cat-txt">Produto em destaque</div></div>

  <div class="title-block">
    <div class="t-model">HAVAL</div>
    <div class="t-sub">H6 HEV 2</div>
  </div>

  <div class="tagline">A nova referência em SUV híbrido.</div>

  <div class="specs">
    <div class="spec">
      <div><span class="sp-val">243</span><span class="sp-unit">cv</span></div>
      <div class="sp-lbl">Potência combinada</div>
    </div>
    <div class="spec" style="padding-left:24px;">
      <div><span class="sp-val">800</span><span class="sp-unit">+km</span></div>
      <div class="sp-lbl">Autonomia total</div>
    </div>
    <div class="spec" style="padding-left:24px;">
      <div><span class="sp-val">0</span><span class="sp-unit">R$/km*</span></div>
      <div class="sp-lbl">No modo elétrico</div>
    </div>
  </div>

  <div class="footer">
    <div class="f-left">
      <div class="f-city">Jundiaí — SP</div>
      <div class="f-dot"></div>
      <div class="f-tag">GWM Dahruj</div>
    </div>
    <div class="f-url">gwmdahruj.com.br</div>
  </div>
</div>
</body>
</html>
