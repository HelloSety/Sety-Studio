<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LGD RECORDS</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 40'><text y='.9em' font-size='36' font-family='Arial' font-weight='900' fill='white'>LGD</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-inner">
    <p class="splash-logo">LGD</p>
    <p class="splash-sub">RECORDS</p>
    <div class="splash-line"></div>
    <p class="splash-tagline">LGD Records. Cultura, Música e Rua.</p>
    <form class="splash-form-wrap" id="splashForm">
      <input class="splash-email" type="email" placeholder="Seu e-mail" required autocomplete="email">
      <button class="splash-submit" type="submit">Entrar</button>
    </form>
    <button class="splash-skip" id="splashSkip">Pular</button>
  </div>
</div>

<div class="splash-exit" id="splashExit"></div>

<script src="script.js"></script>
</body>
</html>
