version: "3.8"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sety-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-setydb}
      POSTGRES_USER: ${POSTGRES_USER:-sety}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sety-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sety}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sety-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - sety-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Evolution API ────────────────────────────────────────────────────────────
  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: sety-evolution
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_URL: https://${EVOLUTION_DOMAIN}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: true

      # Banco de dados
      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-sety}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-setydb}
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: true
      DATABASE_SAVE_MESSAGE_UPDATE: true
      DATABASE_SAVE_DATA_CONTACTS: true
      DATABASE_SAVE_DATA_CHATS: true
      DATABASE_SAVE_DATA_LABELS: true
      DATABASE_SAVE_DATA_HISTORIC: true

      # Cache Redis
      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: true
      CACHE_LOCAL_ENABLED: false

      # Webhook global (Nexa SDR)
      WEBHOOK_GLOBAL_ENABLED: true
      WEBHOOK_GLOBAL_URL: http://nexa:3000/webhook
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: true
      WEBHOOK_EVENTS_MESSAGES_UPSERT: true
      WEBHOOK_EVENTS_SEND_MESSAGE: false
      WEBHOOK_EVENTS_CONNECTION_UPDATE: false

      # WhatsApp Baileys
      WA_BUSINESS_TOKEN_WEBHOOK: ${WA_BUSINESS_TOKEN_WEBHOOK:-}
      QRCODE_LIMIT: 30
      QRCODE_COLOR: "#198754"

      LOG_LEVEL: ERROR
      LOG_COLOR: false
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - sety-net

  # ── Nexa SDR (Node.js) ──────────────────────────────────────────────────────
  nexa:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sety-nexa
    restart: always
    depends_on:
      - evolution
    environment:
      PORT: 3000
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-sety}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    networks:
      - sety-net

  # ── Nginx Proxy Manager ──────────────────────────────────────────────────────
  nginx:
    image: jc21/nginx-proxy-manager:latest
    container_name: sety-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"   # Painel admin NPM
    environment:
      DB_SQLITE_FILE: /data/database.sqlite
      DISABLE_IPV6: true
    volumes:
      - nginx_data:/data
      - nginx_letsencrypt:/etc/letsencrypt
    networks:
      - sety-net

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  nginx_data:
  nginx_letsencrypt:

networks:
  sety-net:
    driver: bridge
