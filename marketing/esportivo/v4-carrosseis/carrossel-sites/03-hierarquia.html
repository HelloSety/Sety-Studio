<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#F2EFE9; }
.slide { width:1080px; height:1350px; position:relative; overflow:hidden; }

.grid {
  position:absolute; inset:0; z-index:1;
  background-image:
    linear-gradient(rgba(0,0,0,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.022) 1px, transparent 1px);
  background-size:60px 60px;
}
.ghost {
  position:absolute; right:-30px; bottom:-70px; z-index:2; pointer-events:none;
  font-family:'Bebas Neue',sans-serif; font-size:640px; line-height:1;
  color:rgba(0,0,0,0.04); user-select:none;
}

/* Top bar */
.top-bar {
  position:absolute; top:0; left:0; right:0; z-index:20;
  height:64px; display:flex; align-items:center; justify-content:space-between;
  padding:0 52px; border-bottom:1px solid rgba(0,0,0,0.07);
}
.brand { display:flex; align-items:center; }
.brand-bar { width:6px; height:30px; background:#E85D00; }
.brand-txt {
  font-family:'Barlow',sans-serif; font-weight:700; font-size:9px;
  letter-spacing:4px; color:rgba(0,0,0,0.35); text-transform:uppercase; margin-left:12px;
}
.counter { font-family:'Barlow',sans-serif; font-weight:300; font-size:11px; letter-spacing:3px; color:rgba(0,0,0,0.3); }
.counter b { color:#E85D00; font-weight:800; }

/* Content */
.content {
  position:absolute; left:72px; right:72px; top:96px; bottom:80px; z-index:10;
  display:flex; flex-direction:column; justify-content:center;
}

.detail-tag {
  display:flex; align-items:center; gap:12px; margin-bottom:16px;
}
.detail-num {
  font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px;
  background:#E85D00; color:#fff; padding:4px 10px; border-radius:2px;
}
.detail-name {
  font-family:'Barlow',sans-serif; font-weight:700; font-size:9px;
  letter-spacing:5px; color:rgba(0,0,0,0.4); text-transform:uppercase;
}

.headline {
  font-family:'Barlow',sans-serif; font-weight:900; font-size:86px;
  line-height:0.88; color:#0A0A0F; margin-bottom:36px; letter-spacing:-2.5px;
}

/* COMPARISON VISUAL */
.comparison {
  display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:36px;
}

.comp-card {
  border-radius:10px; overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.1);
}
.comp-label {
  padding:10px 16px;
  font-family:'Barlow',sans-serif; font-weight:700; font-size:9px;
  letter-spacing:4px; text-transform:uppercase;
}
.comp-content { padding:20px; }

/* ANTES - cluttered */
.antes { background:#fff; }
.antes .comp-label { background:#EF4444; color:#fff; }
.antes .comp-content { display:flex; flex-direction:column; gap:6px; }
.a-row { display:flex; gap:6px; align-items:center; }
.a-block { border-radius:3px; background:rgba(0,0,0,0.1); }
.a-txt-sm { height:10px; background:rgba(0,0,0,0.08); border-radius:2px; }
.a-txt-md { height:14px; background:rgba(0,0,0,0.12); border-radius:2px; }
.a-txt-lg { height:20px; background:rgba(0,0,0,0.15); border-radius:2px; }
.a-btn { height:32px; background:rgba(0,0,0,0.1); border-radius:4px; margin-top:4px; }
/* Small random elements to show clutter */
.clutter { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
.clutter-item { height:28px; background:rgba(0,0,0,0.07); border-radius:3px; }

/* DEPOIS - clean */
.depois { background:#fff; }
.depois .comp-label { background:#16A34A; color:#fff; }
.depois .comp-content { display:flex; flex-direction:column; gap:12px; }
.d-badge { width:60px; height:10px; background:#FEE2E2; border-radius:10px; }
.d-h1 { height:28px; background:#0A0A0F; border-radius:3px; width:85%; }
.d-h2 { height:16px; background:rgba(0,0,0,0.15); border-radius:3px; width:60%; }
.d-space { height:6px; }
.d-p1 { height:10px; background:rgba(0,0,0,0.1); border-radius:2px; width:90%; }
.d-p2 { height:10px; background:rgba(0,0,0,0.07); border-radius:2px; width:75%; }
.d-space2 { height:6px; }
.d-btn { height:36px; background:#E85D00; border-radius:5px; width:70%; }

/* Body copy */
.body {
  font-family:'Barlow',sans-serif; font-weight:300; font-size:15px;
  color:rgba(0,0,0,0.5); line-height:1.7; letter-spacing:0.2px;
}
.body strong { color:#0A0A0F; font-weight:700; }

.handle {
  position:absolute; bottom:36px; right:52px; z-index:20;
  font-family:'Barlow',sans-serif; font-size:9px; font-weight:300;
  letter-spacing:3px; color:rgba(0,0,0,0.25); text-transform:lowercase;
}
</style>
</head>
<body>
<div class="slide">
  <div class="grid"></div>
  <div class="ghost">1</div>

  <div class="top-bar">
    <div class="brand">
      <div class="brand-bar"></div>
      <div class="brand-txt">Sety Studio</div>
    </div>
    <div class="counter"><b>03</b> / 07</div>
  </div>

  <div class="content">
    <div class="detail-tag">
      <div class="detail-num">DETALHE 01</div>
      <div class="detail-name">O Primeiro Erro</div>
    </div>

    <div class="headline">
      hierarquia<br>visual.
    </div>

    <div class="comparison">
      <!-- ANTES -->
      <div class="comp-card antes">
        <div class="comp-label">✗ Sem hierarquia</div>
        <div class="comp-content">
          <div class="a-row">
            <div class="a-block" style="width:40px;height:40px;border-radius:6px;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
              <div class="a-txt-md" style="width:80%"></div>
              <div class="a-txt-sm" style="width:60%"></div>
            </div>
          </div>
          <div class="clutter">
            <div class="clutter-item"></div>
            <div class="clutter-item"></div>
            <div class="clutter-item"></div>
            <div class="clutter-item"></div>
          </div>
          <div class="a-txt-lg" style="width:100%"></div>
          <div class="a-txt-sm" style="width:90%"></div>
          <div class="a-txt-sm" style="width:70%"></div>
          <div class="clutter" style="grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;">
            <div class="clutter-item" style="height:22px;"></div>
            <div class="clutter-item" style="height:22px;background:#E85D0033;"></div>
          </div>
          <div class="a-btn"></div>
        </div>
      </div>

      <!-- DEPOIS -->
      <div class="comp-card depois">
        <div class="comp-label">✓ Com hierarquia</div>
        <div class="comp-content">
          <div class="d-badge"></div>
          <div class="d-h1"></div>
          <div class="d-h2"></div>
          <div class="d-space"></div>
          <div class="d-p1"></div>
          <div class="d-p2"></div>
          <div class="d-space2"></div>
          <div class="d-btn"></div>
        </div>
      </div>
    </div>

    <div class="body">
      O olho precisa de um caminho.<br>
      <strong>Sem hierarquia, o cliente se perde — e vai embora.</strong>
    </div>
  </div>

  <div class="handle">@setystudio</div>
</div>
</body>
</html>
