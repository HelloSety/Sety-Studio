<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#F2EFE9; }
.slide { width:1080px; height:1350px; position:relative; overflow:hidden; }

/* Grid sutil */
.grid {
  position:absolute; inset:0; z-index:1;
  background-image:
    linear-gradient(rgba(0,0,0,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.022) 1px, transparent 1px);
  background-size:60px 60px;
}

/* Ghost number */
.ghost {
  position:absolute; right:-40px; bottom:-80px; z-index:2; pointer-events:none;
  font-family:'Bebas Neue',sans-serif; font-size:640px; line-height:1;
  color:rgba(0,0,0,0.045); user-select:none;
}

/* Top bar */
.top-bar {
  position:absolute; top:0; left:0; right:0; z-index:20;
  height:64px; display:flex; align-items:center; justify-content:space-between;
  padding:0 52px;
  border-bottom:1px solid rgba(0,0,0,0.07);
}
.brand { display:flex; align-items:center; gap:0; }
.brand-bar { width:6px; height:30px; background:#E85D00; }
.brand-txt {
  font-family:'Barlow',sans-serif; font-weight:700; font-size:9px;
  letter-spacing:4px; color:rgba(0,0,0,0.35); text-transform:uppercase;
  margin-left:12px;
}
.counter {
  font-family:'Barlow',sans-serif; font-weight:300; font-size:11px;
  letter-spacing:3px; color:rgba(0,0,0,0.3);
}
.counter b { color:#E85D00; font-weight:800; }

/* CONTENT */
.content {
  position:absolute; left:72px; right:72px; top:100px; bottom:80px; z-index:10;
  display:flex; flex-direction:column; justify-content:center;
}

/* Intro label */
.intro-label {
  font-family:'Barlow',sans-serif; font-weight:700; font-size:9px;
  letter-spacing:5px; color:#E85D00; text-transform:uppercase;
  margin-bottom:28px;
}

/* Main headline */
.headline {
  font-family:'Barlow',sans-serif; font-weight:900; font-size:82px;
  line-height:0.92; color:#0A0A0F; margin-bottom:44px;
  letter-spacing:-2px;
}
.headline .dim { color:rgba(0,0,0,0.25); }

/* Big stat highlight */
.stat-block {
  background:#0A0A0F; border-radius:12px;
  padding:40px 44px;
  margin-bottom:40px;
  display:flex; align-items:center; gap:48px;
}
.stat-num {
  font-family:'Bebas Neue',sans-serif; font-size:120px; line-height:1;
  color:#E85D00; flex-shrink:0;
}
.stat-txt-block { display:flex; flex-direction:column; gap:8px; }
.stat-txt {
  font-family:'Barlow',sans-serif; font-weight:700; font-size:22px;
  color:#fff; line-height:1.2; letter-spacing:-0.5px;
}
.stat-sub {
  font-family:'Barlow',sans-serif; font-weight:300; font-size:13px;
  color:rgba(255,255,255,0.4); line-height:1.6; letter-spacing:0.2px;
}

/* Body copy */
.body {
  font-family:'Barlow',sans-serif; font-weight:300; font-size:16px;
  color:rgba(0,0,0,0.5); line-height:1.75; letter-spacing:0.2px;
  max-width:740px;
}
.body strong { font-weight:700; color:rgba(0,0,0,0.75); }

/* Bottom handle */
.handle {
  position:absolute; bottom:36px; right:52px; z-index:20;
  font-family:'Barlow',sans-serif; font-size:9px; font-weight:300;
  letter-spacing:3px; color:rgba(0,0,0,0.25); text-transform:lowercase;
}
</style>
</head>
<body>
<div class="slide">
  <div class="grid"></div>
  <div class="ghost">2</div>

  <div class="top-bar">
    <div class="brand">
      <div class="brand-bar"></div>
      <div class="brand-txt">Sety Studio</div>
    </div>
    <div class="counter"><b>02</b> / 07</div>
  </div>

  <div class="content">
    <div class="intro-label">O Problema</div>
    <div class="headline">
      <span class="dim">seu site</span><br>
      está afastando<br>
      clientes.
    </div>

    <div class="stat-block">
      <div class="stat-num">96%</div>
      <div class="stat-txt-block">
        <div class="stat-txt">dos visitantes saem<br>sem comprar nada.</div>
        <div class="stat-sub">Não é o seu produto.<br>É a estrutura do seu site.</div>
      </div>
    </div>

    <div class="body">
      A maioria dos sites tem a intenção certa,<br>
      mas erra nos <strong>5 detalhes que realmente convertem</strong>.<br>
      Vou te mostrar cada um deles.
    </div>
  </div>

  <div class="handle">@setystudio</div>
</div>
</body>
</html>
