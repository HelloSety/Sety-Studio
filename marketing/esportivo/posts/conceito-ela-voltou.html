<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,300;0,900;1,900&family=Barlow:wght@300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#000; }
.c { width:1080px; height:1350px; position:relative; }

/* Produto em destaque — multiply para dissolver fundo branco */
.product {
  position:absolute; inset:0; z-index:1;
  display:flex; align-items:center; justify-content:center;
}
.product img {
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
  filter:brightness(0.65) contrast(1.25) saturate(0.85);
  mix-blend-mode: multiply;
}

/* Camada base escura para o multiply funcionar */
.base { position:absolute; inset:0; z-index:0; background:#111; }

/* Toque de cor quente — retrô */
.color-wash {
  position:absolute; inset:0; z-index:2;
  background: radial-gradient(ellipse at 50% 45%, rgba(180,100,30,0.18) 0%, transparent 65%);
  mix-blend-mode: screen;
}

/* Vinheta */
.vignette {
  position:absolute; inset:0; z-index:3;
  background: radial-gradient(ellipse at 50% 45%, transparent 35%, rgba(0,0,0,0.5) 65%, rgba(0,0,0,0.95) 100%);
}

.shadow-bottom {
  position:absolute; bottom:0; left:0; right:0; height:45%; z-index:4;
  background:linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 45%, transparent 100%);
}
.shadow-top {
  position:absolute; top:0; left:0; right:0; height:22%; z-index:4;
  background:linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
}

/* Linha dourada — evoca nostalgia */
.blade {
  position:absolute; top:0; left:0; z-index:10;
  width:3px; height:100%;
  background:linear-gradient(to bottom, transparent 0%, rgba(200,160,60,0.7) 25%, rgba(200,160,60,0.7) 75%, transparent 100%);
}

/* Tag discreta */
.tag {
  position:absolute; top:52px; left:60px; z-index:20;
  font-family:'Barlow',sans-serif;
  font-size:12px; font-weight:300; letter-spacing:6px;
  color:rgba(255,255,255,0.3); text-transform:uppercase;
}

.handle {
  position:absolute; top:52px; right:56px; z-index:20;
  font-family:'Barlow',sans-serif;
  font-size:12px; font-weight:300; letter-spacing:4px;
  color:rgba(255,255,255,0.25); text-transform:lowercase;
}

/* Copy — mínima */
.copy {
  position:absolute; bottom:80px; left:60px; right:60px; z-index:20;
}

.headline {
  font-family:'Barlow Condensed',sans-serif;
  font-size:148px; font-weight:900; line-height:0.86;
  color:#fff; text-transform:uppercase; letter-spacing:-5px;
  display:block; margin-bottom:20px;
}
.headline em {
  font-style:italic; color:rgba(255,255,255,0.55);
  -webkit-text-stroke:1px rgba(255,255,255,0.4);
  color:transparent;
  display:block;
}

.sub {
  font-family:'Barlow',sans-serif;
  font-size:18px; font-weight:300; letter-spacing:7px;
  color:rgba(255,255,255,0.38); text-transform:uppercase;
}
</style>
</head>
<body>
<div class="c">
  <div class="base"></div>
  <div class="product">
    <img src="../../../saidas/shopify-produtos-2026/imagens/RÊTRO/psg/imagem-principal.jpg" alt="">
  </div>
  <div class="color-wash"></div>
  <div class="vignette"></div>
  <div class="shadow-bottom"></div>
  <div class="shadow-top"></div>
  <div class="blade"></div>

  <div class="tag">Coleção Retrô</div>
  <div class="handle">@emporionortebelem</div>

  <div class="copy">
    <span class="headline">Ela<br><em>voltou.</em></span>
    <div class="sub">A coleção que você não esperava.</div>
  </div>
</div>
</body>
</html>
