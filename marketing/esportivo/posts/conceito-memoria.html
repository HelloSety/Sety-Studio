<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,300;0,900;1,900&family=Barlow:wght@300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#000; }
.c { width:1080px; height:1350px; position:relative; }

/* Produto — centralizado, enorme, respira */
.product {
  position:absolute;
  top:50%; left:50%; transform:translate(-50%, -52%);
  z-index:2; width:96%; max-height:1050px;
  display:flex; align-items:center; justify-content:center;
}
.product img {
  width:100%; height:auto;
  object-fit:contain;
  filter:brightness(0.82) contrast(1.12);
}

/* Glow sutil atrás do produto */
.glow {
  position:absolute;
  top:50%; left:50%; transform:translate(-50%,-52%);
  width:700px; height:700px; z-index:1; border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 65%);
}

/* Escuridão só nas bordas e fundo */
.vignette {
  position:absolute; inset:0; z-index:3;
  background:
    radial-gradient(ellipse at 50% 42%, transparent 38%, rgba(0,0,0,0.4) 62%, rgba(0,0,0,0.98) 100%);
}
.shadow-bottom {
  position:absolute; bottom:0; left:0; right:0; height:30%; z-index:4;
  background:linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 55%, transparent 100%);
}
.shadow-top {
  position:absolute; top:0; left:0; right:0; height:16%; z-index:4;
  background:linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
}

.blade {
  position:absolute; top:0; left:0; z-index:10;
  width:2px; height:100%;
  background:linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.4) 30%, rgba(255,255,255,0.4) 70%, transparent 100%);
}

.handle {
  position:absolute; top:52px; right:56px; z-index:20;
  font-family:'Barlow',sans-serif;
  font-size:12px; font-weight:300; letter-spacing:4px;
  color:rgba(255,255,255,0.25); text-transform:lowercase;
}

/* Copy: dois blocos separados — top e bottom */
.copy-bottom {
  position:absolute; bottom:52px; left:0; right:0; z-index:20;
  text-align:center; padding:0 60px;
}

.line1 {
  font-family:'Barlow Condensed',sans-serif;
  font-size:52px; font-weight:100; letter-spacing:16px;
  color:rgba(255,255,255,0.45); text-transform:uppercase;
  display:block; margin-bottom:10px;
}

.line2 {
  font-family:'Barlow Condensed',sans-serif;
  font-size:96px; font-weight:900; letter-spacing:-2px;
  color:#fff; text-transform:uppercase;
  display:block; line-height:0.9;
}

.divider {
  width:40px; height:1px; background:rgba(255,255,255,0.3);
  margin:20px auto;
}

.line3 {
  font-family:'Barlow',sans-serif;
  font-size:16px; font-weight:300; letter-spacing:7px;
  color:rgba(255,255,255,0.3); text-transform:uppercase;
}
</style>
</head>
<body>
<div class="c">
  <div class="glow"></div>
  <div class="product">
    <img src="../../../saidas/shopify-produtos-2026/imagens/SELEÇÕES/argentina/imagem-principal.jpg" alt="">
  </div>
  <div class="vignette"></div>
  <div class="shadow-bottom"></div>
  <div class="shadow-top"></div>
  <div class="blade"></div>

  <div class="handle">@emporionortebelem</div>

  <div class="copy-bottom">
    <span class="line1">Mais que uniforme.</span>
    <span class="line2">Memória.</span>
    <div class="divider"></div>
    <div class="line3">Coleção Seleções · Link na bio</div>
  </div>
</div>
</body>
</html>
