<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; background: #080808; font-family: 'Barlow Condensed', sans-serif; }
  .c { width: 1080px; height: 1920px; position: relative; overflow: hidden; }

  /* Background com imagem de produto */
  .bg {
    position: absolute; inset: 0; z-index: 1;
  }
  .bg img {
    width: 100%; height: 100%; object-fit: cover; object-position: center;
    filter: brightness(0.25) saturate(0.7);
  }

  /* Overlay */
  .ov { position: absolute; inset: 0; z-index: 2; background: rgba(0,0,0,0.5); }

  /* Glow verde */
  .glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 800px; height: 800px; z-index: 3;
    background: radial-gradient(circle, rgba(0,200,100,0.12) 0%, transparent 65%);
  }

  /* Linha lateral */
  .blade { position: absolute; top: 0; left: 0; z-index: 5; width: 4px; height: 100%; background: linear-gradient(to bottom, #00c864 50%, transparent 100%); }

  /* Header */
  .hdr {
    position: absolute; top: 80px; left: 60px; right: 60px; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { font-size: 16px; font-weight: 700; letter-spacing: 5px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
  .handle { font-size: 13px; letter-spacing: 3px; color: #00c864; font-family: 'Inter', sans-serif; }

  /* Conteúdo central */
  .centro {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 20; text-align: center; width: 900px;
  }

  .emoji { font-size: 80px; margin-bottom: 40px; display: block; }

  .pergunta {
    font-size: 76px; font-weight: 900; line-height: 1.0;
    color: #fff; text-transform: uppercase; letter-spacing: -2px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    margin-bottom: 20px;
  }
  .pergunta span { color: #00c864; }

  .sub-pergunta {
    font-size: 26px; font-weight: 300; letter-spacing: 4px;
    color: rgba(255,255,255,0.55); text-transform: uppercase;
    margin-bottom: 80px;
  }

  /* Opções */
  .opcoes {
    display: flex; flex-direction: column; gap: 24px; align-items: center;
  }

  .opcao {
    width: 780px; padding: 30px 50px;
    border-radius: 16px;
    font-size: 34px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }

  .opcao-a {
    background: rgba(0,200,100,0.15); border: 2px solid rgba(0,200,100,0.5);
    color: #00c864;
  }
  .opcao-b {
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
  }

  .opcao-pct {
    font-size: 26px; font-weight: 300; color: inherit; opacity: 0.7;
  }

  /* Dica */
  .dica {
    position: absolute; bottom: 220px; left: 50%; transform: translateX(-50%);
    z-index: 20; text-align: center;
    font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 400;
    letter-spacing: 3px; color: rgba(255,255,255,0.35); text-transform: uppercase;
  }

  /* Footer */
  .ftr {
    position: absolute; bottom: 80px; left: 60px; right: 60px; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.08); padding-top: 28px;
  }
  .ftr-l { font-size: 15px; letter-spacing: 4px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
  .ftr-r { font-size: 15px; font-weight: 700; letter-spacing: 3px; color: #00c864; text-transform: uppercase; }
</style>
</head>
<body>
<div class="c">
  <div class="bg">
    <img src="../../../saidas/shopify-produtos-2026/imagens/RÊTRO/psg/imagem-principal.jpg" alt="Retrô">
  </div>
  <div class="ov"></div>
  <div class="glow"></div>
  <div class="blade"></div>

  <div class="hdr">
    <div class="brand">Empório Norte Belém</div>
    <div class="handle">@emporionortebelem</div>
  </div>

  <div class="centro">
    <span class="emoji">⚽</span>
    <div class="pergunta">
      Camisa <span>Retrô</span><br>ou<br><span>Atual?</span>
    </div>
    <div class="sub-pergunta">Você prefere qual?</div>
    <div class="opcoes">
      <div class="opcao opcao-a">
        <span>Retrô clássica</span>
        <span class="opcao-pct">↑ vote</span>
      </div>
      <div class="opcao opcao-b">
        <span>Lançamento atual</span>
        <span class="opcao-pct">↓ vote</span>
      </div>
    </div>
  </div>

  <div class="dica">Responde nos comentários ⬇</div>

  <div class="ftr">
    <div class="ftr-l">Coleção completa na bio</div>
    <div class="ftr-r">Link na Bio ↗</div>
  </div>
</div>
</body>
</html>
