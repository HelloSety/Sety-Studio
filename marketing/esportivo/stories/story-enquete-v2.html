<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,300;0,700;0,900;1,900&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1920px; overflow:hidden; background:#060606; font-family:'Barlow Condensed',sans-serif; }
.c { width:1080px; height:1920px; position:relative; overflow:hidden; }

/* Produto ao fundo — full bleed */
.bg-product {
  position:absolute; inset:0; z-index:1;
}
.bg-product img {
  width:100%; height:100%; object-fit:cover; object-position:center;
  filter:brightness(0.35) saturate(0.5) contrast(1.1);
  mix-blend-mode:normal;
}

/* Overlays */
.ov {
  position:absolute; inset:0; z-index:2;
  background:
    linear-gradient(to bottom, rgba(6,6,6,0.9) 0%, rgba(6,6,6,0.3) 20%, rgba(6,6,6,0.2) 50%, rgba(6,6,6,0.5) 80%, rgba(6,6,6,0.95) 100%);
}

/* Glow central */
.glow {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:900px; height:900px; z-index:3; border-radius:50%;
  background:radial-gradient(circle, rgba(0,229,113,0.1) 0%, transparent 60%);
}

/* Linhas verticais sutis */
.lines {
  position:absolute; inset:0; z-index:3;
  background: repeating-linear-gradient(
    90deg, transparent, transparent 179px,
    rgba(255,255,255,0.018) 179px, rgba(255,255,255,0.018) 180px
  );
}

/* Linha lateral */
.blade {
  position:absolute; top:0; left:0; z-index:10; width:3px; height:100%;
  background:linear-gradient(to bottom, #00E571 0%, rgba(0,229,113,0.3) 50%, rgba(0,229,113,0) 100%);
}

/* Header */
.hdr {
  position:absolute; top:72px; left:60px; right:60px; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
}
.hdr-brand { font-size:14px; font-weight:300; letter-spacing:6px; color:rgba(255,255,255,0.35); text-transform:uppercase; }
.hdr-handle { font-size:13px; font-weight:300; letter-spacing:4px; color:#00E571; font-family:'Barlow',sans-serif; }

/* Conteúdo central */
.main {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:20; width:900px; text-align:center;
}

.eyebrow {
  font-size:14px; font-weight:700; letter-spacing:8px;
  color:#00E571; text-transform:uppercase;
  margin-bottom:36px;
  display:flex; align-items:center; justify-content:center; gap:20px;
}
.eyebrow::before, .eyebrow::after {
  content:''; display:block; width:40px; height:1.5px; background:#00E571; flex-shrink:0;
}

.question {
  font-size:112px; font-weight:900; line-height:0.88;
  color:#fff; text-transform:uppercase; letter-spacing:-4px;
  text-shadow:0 4px 30px rgba(0,0,0,0.8);
  margin-bottom:16px;
}
.question em { color:#00E571; font-style:normal; display:block; }
.question span { font-weight:100; -webkit-text-stroke:1.5px rgba(255,255,255,0.3); color:transparent; display:block; }

.sub {
  font-size:22px; font-weight:300; letter-spacing:6px;
  color:rgba(255,255,255,0.4); text-transform:uppercase;
  margin-bottom:72px;
}

/* Opções */
.options { display:flex; flex-direction:column; gap:20px; align-items:center; }

.option {
  width:820px; padding:32px 52px;
  border-radius:12px;
  display:flex; align-items:center; justify-content:space-between;
  font-size:30px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  transition:all 0.2s;
}

.option-a {
  background:rgba(0,229,113,0.12); border:1.5px solid rgba(0,229,113,0.45);
  color:#00E571;
}
.option-b {
  background:rgba(255,255,255,0.04); border:1.5px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.75);
}
.option-arrow { font-size:22px; opacity:0.6; }

/* Footer */
.ftr {
  position:absolute; bottom:0; left:0; right:0; z-index:20;
  padding:24px 60px 60px;
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex; align-items:center; justify-content:space-between;
}
.ftr-l { font-size:14px; font-weight:300; letter-spacing:5px; color:rgba(255,255,255,0.25); text-transform:uppercase; }
.ftr-cta {
  font-size:16px; font-weight:900; letter-spacing:4px;
  background:#00E571; color:#000; padding:16px 40px; border-radius:50px;
  text-transform:uppercase;
}
</style>
</head>
<body>
<div class="c">
  <div class="bg-product">
    <img src="../../../saidas/shopify-produtos-2026/imagens/RÊTRO/psg/imagem-principal.jpg" alt="">
  </div>
  <div class="ov"></div>
  <div class="glow"></div>
  <div class="lines"></div>
  <div class="blade"></div>

  <div class="hdr">
    <div class="hdr-brand">Empório Norte Belém</div>
    <div class="hdr-handle">@emporionortebelem</div>
  </div>

  <div class="main">
    <div class="eyebrow">Enquete do Dia</div>
    <div class="question">
      Retrô<br>
      <span>ou</span>
      <em>Atual?</em>
    </div>
    <div class="sub">Você prefere qual?</div>
    <div class="options">
      <div class="option option-a">
        <span>⚡ Retrô Clássica</span>
        <span class="option-arrow">↑</span>
      </div>
      <div class="option option-b">
        <span>🔥 Lançamento Atual</span>
        <span class="option-arrow">↓</span>
      </div>
    </div>
  </div>

  <div class="ftr">
    <div class="ftr-l">Comenta o time abaixo ⬇</div>
    <div class="ftr-cta">Link na Bio ↗</div>
  </div>
</div>
</body>
</html>
